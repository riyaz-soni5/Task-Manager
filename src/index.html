<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Task Manager</title>
    <link rel="stylesheet" href="output.css">
</head>
<body class="w-screen h-screen">

    <div class="w-screen h-full overflow-auto border border-black flex flex-col items-center sm:items-start sm:grid sm:grid-rows-12 sm:grid-cols-12 sm:grid-flow-row sm:auto-rows-auto  dark:bg-black bg-primary">
        <header class=" sm:row-start-1 sm:col-start-1 sm:col-span-full flex justify-around items-center border-b border-gray-500">
            <div class="flex justify-center items-center gap-1">
                <div>
                    <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-8 text-borderColor dark:text-white">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 6.878V6a2.25 2.25 0 0 1 2.25-2.25h7.5A2.25 2.25 0 0 1 18 6v.878m-12 0c.235-.083.487-.128.75-.128h10.5c.263 0 .515.045.75.128m-12 0A2.25 2.25 0 0 0 4.5 9v.878m13.5-3A2.25 2.25 0 0 1 19.5 9v.878m0 0a2.246 2.246 0 0 0-.75-.128H5.25c-.263 0-.515.045-.75.128m15 0A2.25 2.25 0 0 1 21 12v6a2.25 2.25 0 0 1-2.25 2.25H5.25A2.25 2.25 0 0 1 3 18v-6c0-.98.626-1.813 1.5-2.122" />
                    </svg>
                </div>
                <div>
                    <h1 class="text-2xl invisible sm:visible font-medium text-gray-800 dark:text-secondary">Smart Task Manager</h1>
                </div>
                
            </div>
            <div>
            </div>
            <div class="flex gap-5 justify-center items-center">
                <div class="flex justify-center items-center gap-1 border border-black dark:border-secondary p-2 rounded-lg">
                    <div>
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6 text-black dark:text-secondary">
                            <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
                        </svg>
    
                    </div>
                    <div>
                        <input type="search" name="search" id="searchInput" placeholder="Search tasks..." class="text-black dark:text-secondary focus:outline-0">
                    </div>
                </div>

                <div class="border p-2 rounded-lg bg-gray-500 flex justify-center items-center">
                    <button type="button" class="cursor-pointer theme-button">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="white" viewBox="0 0 24 24" class="size-7">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z" />
                        </svg>
                    </button>
    
                </div>
            </div>

        </header>
        <aside class="sm:row-start-2 sm:row-span-11 sm:col-start-2 sm:col-span-3 mt-5 mr-5">
            <div class="border border-borderColor rounded-md overflow-hidden">
                <div class="border border-t-0 border-x-0 p-4 font-bold bg-secondary dark:bg-[#282828] dark:text-secondary">
                    Add New Task
                </div>
                <div class="p-2 bg-gray-100 dark:bg-[#282828] dark:text-white overflow-hidden">
                    <form action="" class="flex flex-col gap-2">
                        <div class="flex flex-col">
                            <label for="task-title">Task Title</label>
                            <input type="text" id="task-title" name="task-title" required class="border p-2 bg-white dark:text-black">
                        </div>
                        <div class="flex flex-col">
                            <label for="priority">Priority</label>
                            <select name="priority" id="priority" class="border p-2 bg-white dark:text-black">
                                <option value="Low Priority">Low Priority</option>
                                <option value="Medium Priority">Medium Priority</option>
                                <option value="High Priority">High Priority</option>
                            </select>
                        </div>
                        <div class="">
                            <button type="submit" id="submit-btn" class="bg-accent text-white p-3 rounded-md w-full cursor-pointer">Add Task</button>
                            <button type="button" id="update-btn" class="bg-accent hidden text-white p-3 rounded-md w-full cursor-pointer">Update Task</button>
                        </div>
                    </form>
                    
                </div>
            </div>


        </aside>
        <main class="sm:row-start-2 sm:row-span-full sm:col-start-5 sm:col-span-7 mt-5 flex flex-col h-full">
            <div class="border border-borderColor p-4 bg-secondary dark:bg-[#282828] dark:text-white">
                <div class="flex justify-start *:border *:p-1 *:px-5">
                    <button class="bg-active cursor-pointer all-tab">
                        All Tasks
                    </button>
                    <button class="cursor-pointer completed-tab">Completed</button>
                    <button class="cursor-pointer pending-tab">Pending</button>
                    <button class="cursor-pointer high-tab">High Priority</button>
                </div>

            </div>
            <div class="flex flex-col gap-2 mt-3 h-full task-container *:grid *:grid-rows-3 *:grid-cols-4 *:border *:border-borderColor *:items-center *:p-2 *:bg-secondary *:dark:bg-[#282828] *:dark:text-white ">
            </div>
        </main>

    </div>




    <script type="module" src="./js/app.js"></script>
    
</body>
</html>
